<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow" style="width:100%;max-width:420px">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <h3 class="fw-bold text-primary">GAC</h3>
        <p class="text-muted small">Gestion des Affaires Contentieuses</p>
      </div>
      <div *ngIf="errorMessage" class="alert alert-danger py-2">{{ errorMessage }}</div>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="mb-3">
          <label for="username" class="form-label">Nom d utilisateur</label>
          <input id="username" type="text" class="form-control" formControlName="username"
            [class.is-invalid]="form.get('username')?.invalid && form.get('username')?.touched"/>
          <div class="invalid-feedback">Champ obligatoire.</div>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label">Mot de passe</label>
          <input id="password" type="password" class="form-control" formControlName="password"
            [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"/>
          <div class="invalid-feedback">Champ obligatoire.</div>
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          Se connecter
        </button>
      </form>
    </div>
  </div>
</div>
