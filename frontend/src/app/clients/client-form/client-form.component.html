<div class="container mt-4">
  <h2>{{ isEditMode ? "Modifier" : "Nouveau client" }}</h2>
  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="mb-3">
      <label class="form-label fw-semibold">Type *</label>
      <div class="d-flex gap-4">
        <div *ngFor="let opt of typeOptions" class="form-check">
          <input class="form-check-input" type="radio" [id]="opt.value" formControlName="typeClient" [value]="opt.value"/>
          <label class="form-check-label" [for]="opt.value">{{ opt.label }}</label>
        </div>
      </div>
    </div>
    <div class="mb-3"><label class="form-label">Nom *</label><input type="text" class="form-control" formControlName="nom" [class.is-invalid]="form.get('nom')?.invalid && form.get('nom')?.touched"/><div class="invalid-feedback">Obligatoire.</div></div>
    <div class="mb-3" *ngIf="isPhysique"><label class="form-label">Prenom</label><input type="text" class="form-control" formControlName="prenom"/></div>
    <div class="mb-3"><label class="form-label">Email *</label><input type="email" class="form-control" formControlName="email" [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"/><div class="invalid-feedback">Email invalide.</div></div>
    <div class="mb-3"><label class="form-label">Tel *</label><input type="text" class="form-control" formControlName="tel" [class.is-invalid]="form.get('tel')?.invalid && form.get('tel')?.touched"/><div class="invalid-feedback">8 chiffres, commence par 2/4/5/7/9.</div></div>
    <div class="mb-3" *ngIf="isPhysique"><label class="form-label">CIN *</label><input type="text" class="form-control" formControlName="cin" [class.is-invalid]="form.get('cin')?.invalid && form.get('cin')?.touched"/><div class="invalid-feedback">8 chiffres.</div></div>
    <div class="mb-3" *ngIf="isMorale"><label class="form-label">RNE *</label><input type="text" class="form-control" formControlName="rne" [class.is-invalid]="form.get('rne')?.invalid && form.get('rne')?.touched"/><div class="invalid-feedback">7 chiffres.</div></div>
    <div class="mb-3"><label class="form-label">Adresse</label><input type="text" class="form-control" formControlName="adresse"/></div>
    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-primary" [disabled]="loading"><span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>{{ isEditMode ? "Enregistrer" : "Creer" }}</button>
      <button type="button" class="btn btn-secondary" (click)="onCancel()">Annuler</button>
    </div>
  </form>
</div>
